<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.datatables.net/2.2.2/css/dataTables.dataTables.css" />
</head>

<body class="bg-light">
    <div id="nav">
        
    </div>

    <div class="row mt-3 mx-auto container g-2">
        <div class="col-12 col-md-3">
            <div class="card">
                <div class="card-body bg-info text-white">
                    <div class="col">
                        <small class="fw-bold">AKUMULASI KAS</small>
                    </div>
                    <div class="col">
                        <small id="akumulasiPenjualan">Rp. 1.534.000</small>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-12 col-md-3">
            <div class="card">
                <div class="card-body bg-danger text-white">
                    <div class="col">
                        <small class="fw-bold">AKUMULASI PENGELUARAN</small>
                    </div>
                    <div class="col">
                        <small id="akumulasiPengeluaran">Rp. 534.000</small>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-12 col-md-3">
            <div class="card">
                <div class="card-body bg-success text-white">
                    <div class="col">
                        <small class="fw-bold">PENJUALAN BERLANGSUNG</small>
                    </div>
                    <div class="col">
                        <small id="akumulasiPenjualanNow">Rp. 534.000</small>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-12 col-md-3">
            <div class="card">
                <div class="card-body bg-warning text-white">
                    <div class="col">
                        <small class="fw-bold">PENGELUARAN BERLANGSUNG</small>
                    </div>
                    <div class="col">
                        <small id="akumulasiPengeluaranNow">Rp. 534.000</small>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="row mt-3 mx-auto container g-3">
        <div class="col-12 col-md-6">
            <div class="card">
                <div class="card-header">
                    <small>List Penjualan</small>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-striped table-hover table-bordered" id="tablePenjualan">
                            <thead>
                                <tr>
                                    <th scope="col" style="width: 5%;">No</th>
                                    <th scope="col">Tanggal</th>
                                    <th scope="col">Nominal</th>
                                </tr>
                            </thead>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-12 col-md-6">
            <div class="card">
                <div class="card-header">
                    <small>List Pengeluaran</small>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-striped table-hover table-bordered" id="tablePengeluaran">
                            <thead>
                                <tr>
                                    <th scope="col" style="width: 5%;">No</th>
                                    <th scope="col">Tanggal</th>
                                    <th scope="col">Nominal</th>
                                </tr>
                            </thead>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="./assets/js/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="https://cdn.datatables.net/2.2.2/js/dataTables.js"></script>
    <script src="./assets/js/tools.js"></script>
    <script src="./assets/js/dashboard.js"></script>
    <script src="./assets/js/main.js"></script>
</body>

</html>
