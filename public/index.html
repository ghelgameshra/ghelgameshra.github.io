<!DOCTYPE html>
<html lang="en" class="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ESS | Login</title>
  <link rel="stylesheet" href="css/tailwind_output.css">
  <link rel="stylesheet" href="css/style.css">
  <script src="js/code.jquery.com_jquery-3.7.1.js"></script>
</head>

<body>
  <main class="min-h-screen flex justify-center align-middle items-center bg-gray-100 dark:bg-[#1e293bff] duration-500">
    <!-- login container -->
    <div class="bg-white flex flex-row gap-3 m-5 p-8 shadow-xl max-w-5xl rounded-2xl dark:bg-[#1e293bff] duration-500">
      <div class="w-1/2 hidden sm:block dark:bg-[#e2e8f0ff] rounded-lg duration-500">
        <img src="img/EssOnline.png" alt="EssOnline.png" class="rounded-lg">
      </div>
      
      <div class="w-full sm:w-1/2 sm:ms-8 text-[#1e293bff] dark:text-[#e2e8f0ff]">

        <!-- logo indomaret, show on mobile -->
        <div class="sm:hidden md:hidden lg:hidden w-[80%] mx-auto mb-3">
          <img src="img/Logo_Indomaret.png" alt="Logo_Indomaret.png">

        </div>
      
        <h1 class="font-black text-3xl text-center sm:text-left">Login ESS Online</h1>
        <p class="font-normal text-sm mt-1 text-center sm:text-left">ESS Online Indomaret Group</p>

        <!-- form -->
        <form action="" class="mt-7 flex flex-col gap-3">
          <!-- nik input -->
          <p class="hidden sm:block -mb-2">Nomor Induk Karyawan</p>
          <div class="flex flex-row">
            <label for="nik" class="font-medium px-4 py-2 border border-gray-200 shadow rounded-l-lg">
              <i class="fa-solid fa-user"></i>
            </label>
            <input id="nik" type="text" class="dark:outline-none dark:border-none w-full p-2 border border-gray-200 shadow rounded-r-lg focus:outline-none dark:text-blue-950" placeholder="Nomor induk karyawan">
          </div>

          <!-- password input -->
          <p class="hidden sm:block -mb-2">Password</p>
          <div class="relative flex flex-row">
            <label for="nik" class="font-medium px-4 py-2 border border-gray-200 shadow rounded-l-lg">
              <i class="fa-solid fa-lock"></i>
            </label>
            <input id="password" type="password" class="dark:outline-none dark:border-none w-full p-2 border border-gray-200 shadow rounded-r-lg focus:outline-none dark:text-blue-950" placeholder="****************">

            <!-- show password button -->
            <button type="button" id="showPassword" class="absolute right-3 top-6 text-xl -translate-y-1/2 text-[#1e293bff]">
              <i class="fa-regular fa-eye-slash" id="eyeIcon"></i>
            </button>
          </div>

          <!-- login button -->
          <button id="loginButton" type="button" class="mt-4 w-full bg-[#1e293bff] dark:bg-[#161f2e] dark:hover:bg-[#2b3950] text-white py-3 font-bold rounded-lg hover:bg-[#2b3950] duration-200 flex flex-row gap-2 justify-center items-center">
            <i class="fa-solid fa-arrow-right-to-bracket"></i>
            <span>Login</span>
          </button>
        </form>

        <!-- forgot password -->
        <div class="mt-5 text-center">
          <hr class="mb-2">
          <a href="" class="underline hover:no-underline">Lupa password ?</a>
        </div>
      </div>
    </div>
    
    <section class="absolute bottom-3 px-3 rounded-full shadow-md dark:border dark:border-gray-600">
      <!-- toggle dark mode -->
      <div class="flex justify-center flex-row gap-2 items-center text-[#1e293bff] py-2 w-1/3 mx-auto rounded-full">
        <span class="dark:text-white">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-brightness-high" viewBox="0 0 16 16">
          <path d="M8 11a3 3 0 1 1 0-6 3 3 0 0 1 0 6zm0 1a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM8 0a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-1 0v-2A.5.5 0 0 1 8 0zm0 13a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-1 0v-2A.5.5 0 0 1 8 13zm8-5a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1 0-1h2a.5.5 0 0 1 .5.5zM3 8a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1 0-1h2A.5.5 0 0 1 3 8zm10.657-5.657a.5.5 0 0 1 0 .707l-1.414 1.415a.5.5 0 1 1-.707-.708l1.414-1.414a.5.5 0 0 1 .707 0zm-9.193 9.193a.5.5 0 0 1 0 .707L3.05 13.657a.5.5 0 0 1-.707-.707l1.414-1.414a.5.5 0 0 1 .707 0zm9.193 2.121a.5.5 0 0 1-.707 0l-1.414-1.414a.5.5 0 0 1 .707-.707l1.414 1.414a.5.5 0 0 1 0 .707zM4.464 4.465a.5.5 0 0 1-.707 0L2.343 3.05a.5.5 0 1 1 .707-.707l1.414 1.414a.5.5 0 0 1 0 .708z"/>
        </svg>
      </span>
        <input type="checkbox" id="darkMode" class="hidden" hidden>
        <label for="darkMode">
          <div class="w-10 h-5 bg-slate-600 rounded-full flex items-center p-1 cursor-pointer">
            <div class="w-4 h-4 rounded-full bg-white duration-500" id="dark-mode-button"></div>
          </div>
        </label>
        <span class="dark:text-white">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-moon" viewBox="0 0 16 16">
            <path d="M6 .278a.768.768 0 0 1 .08.858 7.208 7.208 0 0 0-.878 3.46c0 4.021 3.278 7.277 7.318 7.277.527 0 1.04-.055 1.533-.16a.787.787 0 0 1 .81.316.733.733 0 0 1-.031.893A8.349 8.349 0 0 1 8.344 16C3.734 16 0 12.286 0 7.71 0 4.266 2.114 1.312 5.124.06A.752.752 0 0 1 6 .278zM4.858 1.311A7.269 7.269 0 0 0 1.025 7.71c0 4.02 3.279 7.276 7.319 7.276a7.316 7.316 0 0 0 5.205-2.162c-.337.042-.68.063-1.029.063-4.61 0-8.343-3.714-8.343-8.29 0-1.167.242-2.278.681-3.286z"/>
          </svg>
        </span>
      <!-- toggle dark mode -->
  
      </div>
    </section>
  </main>


  <script src="js/script.js"></script>
  <script src="fontawesome/js/all.min.js"></script>
</body>
</html>
